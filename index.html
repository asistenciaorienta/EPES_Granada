<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Buscador de Empresas · EPES</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">

    <!-- CABECERA -->
    <header class="topbar">
      <div class="brand">
        <img src="logo_epes.png" />
        <div class="title">
          <strong>Buscador de Empresas</strong>
          <span>Servicio Andaluz de Empleo</span>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div>
        <h1>Consulta de empresas</h1>
        <p>Introduce un CIF para obtener el nombre de la empresa.</p>
      </div>
    </section>

    <!-- BUSCADOR -->
    <main>
      <section class="view" style="display:block">
        <div class="panel">

          <div class="form" style="margin-top:14px">
            <div class="field">
              <label for="b_q">CIF</label>
              <input id="b_q" placeholder="Ej: B12345678" onkeypress="handleEnter(event)" />
            </div>

            <div class="form-actions">
              <button class="btn primary" onclick="buscarEmpresa()">Buscar</button>
            </div>
          </div>

          <!-- RESULTADO -->
          <div id="resultadoBusqueda" class="panel" style="margin-top:14px;display:none">
            <h3 style="margin:0;color:var(--ja-blue)">Resultado</h3>
            <p id="resultadoTexto" class="hint" style="margin-top:8px"></p>
          </div>

        </div>
      </section>
    </main>

    <div class="footer">
      <span>EPES · SAE · Junta de Andalucía</span>
    </div>

  </div>

  <script src="js/script_completo.js"></script>
</body>
</html>
